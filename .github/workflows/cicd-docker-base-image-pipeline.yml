# GitHub Actions Workflow
# Builds and pushes Playwright base Docker images (Webkit, Chromium, Chrome)
# to a container registry. Triggered on schedule or via workflow_dispatch.

name: Build and Push Playwright Base Docker Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Allows actions/checkout to clone the private repo
      packages: write # Allows pushing to GitHub Container Registry (GHCR)

    steps:
      # ------------------------------------------------------------------
      # Checkout the repository code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Authenticate with the container registry
      # ------------------------------------------------------------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      # ------------------------------------------------------------------
      # Build and Push Base Docker Image
      # ------------------------------------------------------------------
      - name: Build and Push Base Docker Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.base
          no-cache: true
          push: true
          tags: ghcr.io/serhatgemici/playwright-test:latest
