# GitHub Actions Workflow
# Builds and pushes Playwright base Docker images (Webkit, Chromium, Chrome)
# to a container registry. Triggered on schedule or via workflow_dispatch.

name: Build and Push Playwright Base Docker Images

on:
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub Actions tab.
  schedule:
    - cron: '0 22 * * *'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # Authenticate with the container registry
      # ------------------------------------------------------------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # ------------------------------------------------------------------
      # Build The Base Docker Image
      # ------------------------------------------------------------------
      - name: Build and Push Base Docker Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.base
          no-cache: true
          push: true
          tags: serhatgemici/playwright-test:latest
      # ------------------------------------------------------------------
