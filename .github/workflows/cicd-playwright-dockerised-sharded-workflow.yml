name: Run Playwright Tests in Docker (Parallel Shard)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      shard1_run_script:
        description: 'npm script to run for Shard 1'
        required: true
        default: 'test:dev:shard1'
      shard2_run_script:
        description: 'npm script to run for Shard 2'
        required: true
        default: 'test:dev:shard2'
      shard3_run_script:
        description: 'npm script to run for Shard 3'
        required: true
        default: 'test:dev:shard3'
      shard4_run_script:
        description: 'npm script to run for Shard 4'
        required: true
        default: 'test:dev:shard4'

jobs:
  # ------------------------------------------------------------------
  # 1. Build Docker image once for all shards
  # ------------------------------------------------------------------
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true # pushes to GHCR so it can be pulled in parallel jobs
          tags: ghcr.io/${{ github.repository_owner }}/playwright-test:${{ github.run_id }}
          cache-from: type=gha,scope=${{ github.ref_name }}-playwright
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-playwright
  # ------------------------------------------------------------------
  # 2. Run 4 parallel shards
  # ------------------------------------------------------------------
  run-shard-tests:
    needs: build-image
    strategy:
      fail-fast: false # keep other shards running if one fails
      matrix:
        include:
          - shardName: Shard1
            run_script: ${{ github.event.inputs.shard1_run_script  || 'test:dev:shard1' }}
          - shardName: Shard2
            run_script: ${{ github.event.inputs.shard2_run_script  || 'test:dev:shard2' }}
          - shardName: Shard3
            run_script: ${{ github.event.inputs.shard3_run_script  || 'test:dev:shard3' }}
          - shardName: Shard4
            run_script: ${{ github.event.inputs.shard4_run_script  || 'test:dev:shard4' }}
    uses: ./.github/workflows/cicd-playwright-parallel-shard-workflow.yml
    with:
      run_script: ${{ matrix.run_script }}
      shard_name: ${{ matrix.shardName }}
      caller_run_id: ${{ github.run_id }}
    secrets: inherit

  # ------------------------------------------------------------------
  # 3. Merge allure results and publish report
  # ------------------------------------------------------------------
  publish-report:
    runs-on: ubuntu-latest
    needs: run-shard-tests # waits for ALL shards to finish
    if: always() # runs even if some shards failed
    permissions:
      contents: write
      statuses: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      # Download all 4 shard artifacts into separate folders
      - name: Download Allure Results from All Shards
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: allure-results-${{ github.run_id }}-* # matches all 4 shards
          path: allure-results/ # merges all into one folder
          merge-multiple: true # flattens into a single dir

      # Load history from gh-pages for trend graphs
      - name: Load test report history
        uses: actions/checkout@v6.0.3
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: false

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Fix allure-history permissions
        run: sudo chown -R $USER:$USER allure-history || true

      - name: Publish Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # Post link to the report on the PR commit
      - name: Post Report Link to PR
        uses: guibranco/github-status-action-v2@v1.2.4
        with:
          authToken: ${{ github.token }}
          context: 'Allure Test Report'
          state: ${{ needs.run-shard-tests.result == 'success' && 'success' || 'failure' }}
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}
