name: Run Playwright Tests in Docker (Parallel Shard)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      shard1_run_script:
        description: 'npm script to run for Shard 1 (e.g. test:dev:shard1)'
        required: true
      shard2_run_script:
        description: 'npm script to run for Shard 2 (e.g. test:dev:shard2)'
        required: true
      shard3_run_script:
        description: 'npm script to run for Shard 3 (e.g. test:dev:shard3)'
        required: true
      shard4_run_script:
        description: 'npm script to run for Shard 4 (e.g. test:dev:shard4)'
        required: true

jobs:
  # ------------------------------------------------------------------
  # 1. Run 4 parallel shards
  # ------------------------------------------------------------------
  run-shard-tests:
    strategy:
      fail-fast: false # keep other shards running if one fails
      matrix:
        include:
          - shardName: Shard1
            run_script: ${{ github.event.inputs.shard1_run_script }}
          - shardName: Shard2
            run_script: ${{ github.event.inputs.shard2_run_script }}
          - shardName: Shard3
            run_script: ${{ github.event.inputs.shard3_run_script }}
          - shardName: Shard4
            run_script: ${{ github.event.inputs.shard4_run_script }}
    uses: ./.github/workflows/cicd-playwright-parallel-shard-workflow.yml
    with:
      run_script: ${{ matrix.run_script }}
      shard_name: ${{ matrix.shardName }}
    secrets: inherit

  # ------------------------------------------------------------------
  # 2. Merge allure results and publish report
  # ------------------------------------------------------------------
  publish-report:
    runs-on: ubuntu-latest
    needs: run-shard-tests # waits for ALL shards to finish
    if: always() # runs even if some shards failed
    permissions:
      contents: write
      statuses: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      # Download all 4 shard artifacts into separate folders
      - name: Download Allure Results from All Shards
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-${{ github.run_id }}-* # matches all 4 shards
          path: allure-results/ # merges all into one folder
          merge-multiple: true # flattens into a single dir

      # Load history from gh-pages for trend graphs
      - name: Load test report history
        uses: actions/checkout@v6.0.3
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: false

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Fix allure-history permissions
        run: sudo chown -R $USER:$USER allure-history || true

      - name: Publish Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # Post link to the report on the PR commit
      - name: Post Report Link to PR
        uses: Sibz/github-status-action@v1
        with:
          authToken: ${{ github.token }}
          context: 'Allure Test Report'
          state: ${{ needs.run-shard-tests.result == 'success' && 'success' || 'failure' }}
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}
