name: Run Playwright Tests in Docker (Parallel Shard)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tests_per_shard:
        description: 'Max number of tests per shard'
        required: false
        default: '1'
      environment:
        description: 'Test environment (dev, stage, prod)'
        required: false
        default: 'dev'

jobs:
  # ------------------------------------------------------------------
  # 1. Build Docker image + compute shard matrix
  # ------------------------------------------------------------------
  build-and-dispatch-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      shard_count: ${{ steps.set-matrix.outputs.shard_count }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Pre-pull Base Image
        run: |
          docker pull ghcr.io/serhatgemici/playwright-test:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver: docker

      - name: Build & Load Docker Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}

      - name: Count Tests & Generate Matrix
        id: set-matrix
        env:
          TESTS_PER_SHARD: ${{ github.event.inputs.tests_per_shard || '1' }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          IMAGE: ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
        run: |
          # Map environment to Playwright project name
          case "$ENVIRONMENT" in
            dev)   PROJECT="Develop"    ;;
            stage) PROJECT="Stage"      ;;
            prod)  PROJECT="Production" ;;
            *)
              echo "ERROR: Unknown environment '$ENVIRONMENT'. Expected: dev, stage, prod"
              exit 1
              ;;
          esac

          echo "PROJECT=$PROJECT"

          TOTAL_TESTS=$(docker run --rm \
            -e CI=true \
            "$IMAGE" \
            sh -c "npx bddgen > /dev/null 2>&1 && npx playwright test --list --project=$PROJECT 2>/dev/null" \
          | grep '^Total:' | awk '{print $2}')

          echo "TOTAL_TESTS=$TOTAL_TESTS"

          if [ -z "$TOTAL_TESTS" ] || [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "ERROR: Could not determine test count. Got: '$TOTAL_TESTS'"
            exit 1
          fi

          SHARD_COUNT=$(( (TOTAL_TESTS + TESTS_PER_SHARD - 1) / TESTS_PER_SHARD ))
          SHARD_COUNT=$(( SHARD_COUNT < 1 ? 1 : SHARD_COUNT ))
          SHARD_COUNT=$(( SHARD_COUNT > 4 ? 4 : SHARD_COUNT ))

          echo "SHARD_COUNT=$SHARD_COUNT"
          echo "shard_count=$SHARD_COUNT" >> "$GITHUB_OUTPUT"

          # Matrix: her entry shardName + index + total
          MATRIX=$(jq -cn \
            --argjson count "$SHARD_COUNT" \
            '[range(1; $count + 1) | {
              "shardName": ("Shard" + (. | tostring)),
              "index": .,
              "total": $count
            }]')

          echo "Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Push Docker Image to GHCR
        if: steps.set-matrix.outputs.shard_count != '1'
        run: |
          docker push ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
          if [ $? -ne 0 ]; then
            echo "ERROR: Docker image push failed."
            exit 1
          fi

      - name: Run Tests Directly (Single Shard)
        if: steps.set-matrix.outputs.shard_count == '1'
        env:
          IMAGE: ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          docker run --name single-shard \
            -e CI=true \
            "$IMAGE" \
            npm run test:$ENVIRONMENT

      - name: Copy Test Reports (Single Shard)
        if: steps.set-matrix.outputs.shard_count == '1' && always()
        run: |
          docker cp single-shard:/app/allure-results/ ./allure-results/

      - name: Upload Allure Results (Single Shard)
        if: steps.set-matrix.outputs.shard_count == '1' && always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results-${{ github.run_id }}-Shard1
          path: allure-results/
          retention-days: 7

      - name: Cleanup Single Shard Container
        if: steps.set-matrix.outputs.shard_count == '1' && always()
        run: docker rm single-shard

  # ------------------------------------------------------------------
  # 2. Run parallel shards (only if more than 1 shard) using reusable workflow
  # ------------------------------------------------------------------
  dynamic-parallelization:
    name: Shard ${{ matrix.index }}/${{ matrix.total }}
    needs: [build-and-dispatch-tests]
    if: needs.build-and-dispatch-tests.outputs.shard_count != '1'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.build-and-dispatch-tests.outputs.matrix) }}
    uses: ./.github/workflows/cicd-playwright-parallel-shard-workflow.yml
    with:
      # Base script: test:<environment>, shard index/total CLI ile geçilecek
      run_script: test:${{ github.event.inputs.environment || 'dev' }}
      shard_name: ${{ matrix.shardName }}
      shard_index: ${{ matrix.index }}
      shard_total: ${{ matrix.total }}
    secrets: inherit

  # ------------------------------------------------------------------
  # 3. Merge allure results and publish report
  # ------------------------------------------------------------------
  publish-report:
    runs-on: ubuntu-latest
    needs: [build-and-dispatch-tests, dynamic-parallelization]
    if: always()
    permissions:
      contents: write
      statuses: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Download Allure Results from All Shards
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-${{ github.run_id }}-*
          path: allure-results/
          merge-multiple: true

      - name: Load test report history
        uses: actions/checkout@v6.0.3
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: false

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Post Report Link to PR
        uses: guibranco/github-status-action-v2@v1.2.4
        with:
          authToken: ${{ github.token }}
          context: 'Allure Test Report'
          state: ${{ (needs.dynamic-parallelization.result == 'success' || needs.build-and-dispatch-tests.result == 'success') && 'success' || 'failure' }}
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_id }}
