name: Run Playwright Tests in Docker (Parallel Shard)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tests_per_shard:
        description: 'Max number of tests per shard'
        required: false
        default: '40'
      environment:
        description: 'Test environment (dev, stage, local)'
        required: false
        default: 'dev'

jobs:
  # ------------------------------------------------------------------
  # 1. Build Docker image once for all shards
  # ------------------------------------------------------------------
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
          cache-from: type=gha,scope=${{ github.ref_name }}-playwright
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-playwright

      # ------------------------------------------------------------------
      # 2. Count tests and compute dynamic shard matrix
      # ------------------------------------------------------------------
  compute-shards:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Pull Docker Image from GHCR
        run: docker pull ${{ needs.build-image.outputs.image_tag }}

      - name: Count Total Tests & Generate Matrix
        id: set-matrix
        env:
          TESTS_PER_SHARD: ${{ github.event.inputs.tests_per_shard || '40' }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          IMAGE: ${{ needs.build-image.outputs.image_tag }}
        run: |
          # 1. Run bddgen inside container, then count test( lines in .features-gen/
          TOTAL_TESTS=$(docker run --rm \
            -e CI=true \
            "$IMAGE" \
            sh -c "npx bddgen > /dev/null 2>&1 && grep -r '^test(' .features-gen/ --include='*.js' | wc -l" \
          | tr -d ' \n')

          echo "TOTAL_TESTS=$TOTAL_TESTS"

          # 2. Guard: if count is 0 or empty, fail loudly
          if [ -z "$TOTAL_TESTS" ] || [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "ERROR: Could not determine test count. Got: '$TOTAL_TESTS'"
            exit 1
          fi

          # 3. Compute shard count — ceiling division
          SHARD_COUNT=$(( (TOTAL_TESTS + TESTS_PER_SHARD - 1) / TESTS_PER_SHARD ))
          SHARD_COUNT=$(( SHARD_COUNT < 1 ? 1 : SHARD_COUNT ))
          SHARD_COUNT=$(( SHARD_COUNT > 4 ? 4 : SHARD_COUNT ))  # cap at 4 (package.json has shard1-4)

          echo "SHARD_COUNT=$SHARD_COUNT"

          # 4. Generate matrix JSON
          # If only 1 shard → use base script (test:dev), NOT test:dev:shard1
          # If multiple shards → use test:dev:shard1, test:dev:shard2, etc.
          if [ "$SHARD_COUNT" -eq 1 ]; then
            MATRIX=$(jq -cn --arg env "$ENVIRONMENT" \
              '[{"shardName": "Shard1", "run_script": ("test:" + $env)}]'
            )
          else
            MATRIX=$(jq -cn \
              --argjson count "$SHARD_COUNT" \
              --arg env "$ENVIRONMENT" \
              '[range(1; $count + 1) | {
                "shardName": ("Shard" + (. | tostring)),
                "run_script": ("test:" + $env + ":shard" + (. | tostring))
              }]'
            )
          fi

          echo "Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # 3. Run parallel shards (count determined dynamically)
  # ------------------------------------------------------------------
  run-shard-tests:
    needs: [build-image, compute-shards]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.compute-shards.outputs.matrix) }}
    uses: ./.github/workflows/cicd-playwright-parallel-shard-workflow.yml
    with:
      run_script: ${{ matrix.run_script }}
      shard_name: ${{ matrix.shardName }}
    secrets: inherit

  # ------------------------------------------------------------------
  # 4. Merge allure results and publish report
  # ------------------------------------------------------------------
  publish-report:
    runs-on: ubuntu-latest
    needs: run-shard-tests
    if: always()
    permissions:
      contents: write
      statuses: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Download Allure Results from All Shards
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-${{ github.run_id }}-*
          path: allure-results/
          merge-multiple: true

      - name: Load test report history
        uses: actions/checkout@v6.0.3
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: false

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Fix allure-history permissions
        run: sudo chown -R $USER:$USER allure-history || true

      - name: Publish Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Post Report Link to PR
        uses: guibranco/github-status-action-v2@v1.2.4
        with:
          authToken: ${{ github.token }}
          context: 'Allure Test Report'
          state: ${{ needs.run-shard-tests.result == 'success' && 'success' || 'failure' }}
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}
