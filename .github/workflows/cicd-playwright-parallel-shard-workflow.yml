name: playwright-parallel-shard-workflow

on:
  workflow_call:
    inputs:
      run_script:
        required: true
        type: string
      shard_name:
        required: true
        type: string
      shard_index:
        required: true
        type: number
      shard_total:
        required: true
        type: number

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Pull Docker Image from GHCR
        run: docker pull ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}

      - name: Run Playwright Tests in Docker Container
        run: |
          docker run --name ${{ github.run_id }}-${{ inputs.shard_name }} \
            -e CI=true \
            ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }} \
            sh -c "npm run ${{ inputs.run_script }} -- --shard=${{ inputs.shard_index }}/${{ inputs.shard_total }}"

      - name: Copy Test Reports from Container to Host
        if: always()
        run: |
          docker cp ${{ github.run_id }}-${{ inputs.shard_name }}:/app/allure-results/ ./allure-results/

      - name: Upload Allure Results Artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results-${{ github.run_id }}-${{ inputs.shard_name }}
          path: allure-results/
          retention-days: 7
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # Cleanup
      # ------------------------------------------------------------------
      - name: Stop Docker Container
        if: always()
        run: docker stop ${{ github.run_id }}-${{ inputs.shard_name }}

      - name: Remove Docker Container
        if: always()
        run: docker rm ${{ github.run_id }}-${{ inputs.shard_name }}

      - name: Remove Docker Image
        if: always()
        run: docker rmi -f ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}
