name: playwright-parallel-shard-workflow

on:
  workflow_call:
    inputs:
      run_script:
        required: true
        type: string
      shard_name:
        required: true
        type: string

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Pull Docker Image from GHCR
        run: docker pull ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }}

      - name: Run Playwright Tests in Docker Container
        run: |
          docker run --name ${{ github.run_id }}-${{ inputs.shard_name }} \
            -e CI=true \
            ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }} \
            npm run ${{ inputs.run_script }}

      - name: Copy Test Reports from Container to Host
        if: always()
        run: |
          docker cp ${{ github.run_id }}-${{ inputs.shard_name }}:/app/allure-results/ ./
          docker cp ${{ github.run_id }}-${{ inputs.shard_name }}:/app/test-results/ ./

      - name: Upload Allure Results Artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results-${{ github.run_id }}-${{ inputs.shard_name }}
          path: allure-results/
          retention-days: 7

      # ------------------------------------------------------------------
      # Cleanup
      # ------------------------------------------------------------------
      - name: Remove Docker Container
        if: always()
        run: docker rm ${{ github.run_id }}-${{ inputs.shard_name }} || true

      - name: Remove Docker Image
        if: always()
        run: docker rmi -f ghcr.io/${{ github.repository }}/playwright-test:${{ github.run_id }} || true
