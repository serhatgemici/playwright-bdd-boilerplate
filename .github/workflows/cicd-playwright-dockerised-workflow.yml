# GitHub Actions Workflow
# Builds a Docker image, runs Playwright tests inside it,
# copies test reports, publishes Allure report, then cleans up.
# Triggered on schedule or via workflow_dispatch.

name: Run Playwright Tests in Docker

on:
  workflow_dispatch:
    inputs:
      run_script:
        description: 'npm script to run (e.g. test:dev)'
        required: true
        default: 'test:dev'

jobs:
  test-in-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      packages: read # Pull base image from GHCR during Docker build
      pull-requests: write
      checks: write
      pages: write # For publishing Allure report to GitHub Pages
      id-token: write # For authentication if needed

    steps:
      # ------------------------------------------------------------------
      # Checkout the repository code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6.0.3
      # ------------------------------------------------------------------
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Authenticate with the container registry
      # ------------------------------------------------------------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Build Docker Image
      # ------------------------------------------------------------------
      - name: Build the Docker Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          no-cache: true
          push: false
          tags: playwright-test:${{ github.run_id }}
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Run Playwright Tests in Docker Container
      # ------------------------------------------------------------------
      - name: Run Playwright Tests in Docker Container
        run: |
          docker run --name ${{ github.run_id }} \
            -e CI=true \
            playwright-test:${{ github.run_id }} \
            npm run ${{ inputs.run_script }}
      # ------------------------------------------------------------------
      # ------------------------------------------------------------------
      # Copy Test Reports from Container to Host
      # ------------------------------------------------------------------
      - name: Copy Test Reports from Container to Host
        if: always()
        run: |
          docker cp ${{ github.run_id }}:/app/allure-results/ ./
          docker cp ${{ github.run_id }}:/app/test-results/ ./
      # ------------------------------------------------------------------
      # ------------------------------------------------------------------
      # - name: Upload Test Reports as Artifacts
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-reports-${{ github.run_id }}
      #     path: |
      #       allure-results/
      #       test-results/
      #     retention-days: 7
      # # ------------------------------------------------------------------

      - name: Load test report history
        uses: actions/checkout@v6.0.3
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: false

      - name: Build test report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v4.1.0
        if: always()
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Post the link to the report
        if: always()
        uses: Sibz/github-status-action@v1
        with:
          authToken: ${{ github.token }}
          context: 'Test report'
          state: 'success'
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: serhatgemici.github.io/playwright-bdd-boilerplate/${{ github.run_number }}

      # ------------------------------------------------------------------
      # Cleanup: Stop and Remove Container, Remove Image
      # ------------------------------------------------------------------
      - name: Stop Docker Container
        if: always()
        run: docker stop ${{ github.run_id }}

      - name: Remove Docker Container
        if: always()
        run: docker rm ${{ github.run_id }}

      - name: Remove Docker Image
        if: always()
        run: docker rmi -f playwright-test:${{ github.run_id }}
