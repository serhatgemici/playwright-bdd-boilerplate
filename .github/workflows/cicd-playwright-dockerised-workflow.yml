# GitHub Actions Workflow
# GitHub Actions Workflow
# Builds a Docker image, runs Playwright tests inside it,
# copies test reports, publishes Allure report, then cleans up.
# Triggered on schedule or via workflow_dispatch.

name: Run Playwright Tests in Docker

on:
  workflow_dispatch:
    inputs:
      run_script:
        description: 'npm script to run (e.g. test:dev)'
        required: true
        default: 'test:dev'

jobs:
  test-in-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Allows actions/checkout to clone the private repo
      packages: read # Pull base image from GHCR during Docker build
      pull-requests: write
      checks: write

    steps:
      # ------------------------------------------------------------------
      # Checkout the repository code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6.0.3
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Install Node.js — replaces NodeTool@0
      # ------------------------------------------------------------------
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.x'
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Authenticate with the container registry
      # ------------------------------------------------------------------
      - name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Build Docker Image
      # ------------------------------------------------------------------
      - name: Build the Docker Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          no-cache: true
          push: false
          tags: playwright-test:${{ github.run_id }}
      # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      # Run Playwright Tests — replaces the inline script step
      # ------------------------------------------------------------------
      - name: Run Playwright Tests in Docker Container
        run: |
          docker run --name ${{ github.run_id }} \
            -e CI=true \
            playwright-test:${{ github.run_id }} \
            npm run ${{ inputs.run_script }}
      # ------------------------------------------------------------------
      # ------------------------------------------------------------------
      # Copy Test Reports from Container to Host
      # ------------------------------------------------------------------
      - name: Copy Test Reports from Container to Host
        if: always()
        run: |
          docker cp ${{ github.run_id }}:/app/allure-results/ ./
          docker cp ${{ github.run_id }}:/app/test-results/ ./
      # ------------------------------------------------------------------
      # ------------------------------------------------------------------
      - name: Upload Test Reports as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            allure-results/
            test-results/
          retention-days: 7
      # ------------------------------------------------------------------

      # # ------------------------------------------------------------------
      # # Publish Allure Report
      # # ------------------------------------------------------------------
      # - name: Publish Allure Report
      #   if: always()
      #   uses: allure-framework/allure-action@v0
      #   with:
      #     report-directory: ./allure-results
      #     remote-href: 'https://allure-framework.github.io/allure-action/'
      #     github-token: ${{ github.token }}
      #     sections: |
      #       new
      #       flaky
      #       retry
      # # ------------------------------------------------------------------

      # ------------------------------------------------------------------
      - name: Deploy Reports to GitHub pages with History and Retries
        uses: cybersokari/allure-deployer-action@v1.9.7
        with:
          target: 'github'
          github_pages_branch: 'gh-pages'
          allure_results_path: 'allure-results'
          show_history: 'true'
          retries: 5
      # ------------------------------------------------------------------
      # ------------------------------------------------------------------
      # Cleanup: Stop and Remove Container, Remove Image
      # ------------------------------------------------------------------
      - name: Stop Docker Container
        if: always()
        run: docker stop ${{ github.run_id }}

      - name: Remove Docker Container
        if: always()
        run: docker rm ${{ github.run_id }}

      - name: Remove Docker Image
        if: always()
        run: docker rmi -f playwright-test:${{ github.run_id }}
